{% extends 'base.html' %}

{% block title %}Inscription — Data Collector{% endblock %}

{% block content %}

<div class="auth-container">
    <div class="auth-card">

        <div class="auth-logo">📊</div>
        <h2>Créer un compte</h2>
        <p>Rejoignez Data Collector et commencez à collecter des données</p>

        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" id="name"
                   placeholder="Votre nom complet">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email"
                   placeholder="votre@email.com">
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password"
                   placeholder="Au moins 6 caractères">
        </div>

        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="confirm-password"
                   placeholder="••••••••">
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <button class="btn btn-primary btn-full" onclick="register()">
            ✅ Créer mon compte
        </button>

        <p class="auth-link">
            Déjà un compte ?
            <a href="/login">Se connecter</a>
        </p>

    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function register() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');

    errorDiv.textContent = '';
    successDiv.textContent = '';

    if (!name || !email || !password || !confirm) {
        errorDiv.textContent = '⚠️ Veuillez remplir tous les champs';
        return;
    }

    if (password !== confirm) {
        errorDiv.textContent = '⚠️ Les mots de passe ne correspondent pas';
        return;
    }

    if (password.length < 6) {
        errorDiv.textContent = '⚠️ Mot de passe trop court (6 caractères min)';
        return;
    }

    fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            errorDiv.textContent = '❌ ' + data.error;
            return;
        }
        successDiv.textContent = '✅ Compte créé ! Redirection...';
        setTimeout(() => {
            window.location.href = '/login';
        }, 1500);
    })
    .catch(error => {
        errorDiv.textContent = '❌ Erreur lors de l\'inscription';
    });
}

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') register();
});
</script>
{% endblock %}
